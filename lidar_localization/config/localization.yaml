lidar_localization:
  ros__parameters:
    registration_method: NDT_OMP
    score_threshold: 2.0
    ndt_resolution: 1.0
    ndt_step_size: 0.1
    ndt_max_iterations: 35
    ndt_num_threads: 4
    transform_epsilon: 0.01
    voxel_leaf_size: 0.2
    scan_max_range: 100.0
    scan_min_range: 0.2
    scan_period: 0.1
    use_pcd_map: true
    # map_path: package://fast_lio/PCD/test.pcd
    map_path: /home/mau/colcon_ws/src/autonomous_robot_simulation/fast_lio_ros2/PCD/test.pcd
    set_initial_pose: true
    initial_pose_x: 0.1
    initial_pose_y: 0.0
    initial_pose_z: 0.0
    initial_pose_qx: 0.0
    initial_pose_qy: 0.0
    initial_pose_qz: 0.0
    initial_pose_qw: 1.0
    use_odom: false
    use_imu: false
    enable_debug: true
    enable_timer_publishing: false
    pose_publish_frequency: 10.0
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint
    enable_map_odom_tf: true
    lidar_topic_in_: /lidar/points_pcl
    imu_topic_in_: /imu/data_ign
